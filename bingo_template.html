<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bingo Cards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15mm;
        }

        .bingo-metadata {
            margin-bottom: 10mm;
            font-family: Arial;
            font-weight: bold;
            font-size: 5mm;
        }

        .bingo-container {
            display: grid;
            grid-template-columns: repeat({{ layout.cols }}, 1fr);
            gap: {{ layout.card_gap }}mm;
            width: 100%;
        }

        .bingo-card {
            display: grid;
            grid-template-columns: repeat(5, {{ layout.cell_size }}mm);
            grid-template-rows: auto repeat(5, {{ layout.cell_size }}mm);
            border: 1mm solid black;
            gap: {{ layout.cell_gap }}mm;
            padding: {{ layout.card_padding }}mm;
        }

        .bingo-title {
            grid-column: 1 / span 5;
            font-size: {{ layout.title_font }}mm;
            font-weight: bold;
            text-align: center;
            margin-bottom: {{ layout.cell_gap }}mm;
        }

        .bingo-cell {
            width: {{ layout.cell_size }}mm;
            height: {{ layout.cell_size }}mm;
            text-align: center;
            font-size: {{ layout.cell_font }}mm;
            line-height: {{ layout.cell_size }}mm;
            border: 0.5mm solid grey;
        }
    </style>
</head>
<body>
    <div class="bingo-metadata">
        Tarjetas del {{ metadata['rango_tarjetas'] }}
    </div>
    <div class="bingo-container">
        {% for card_id, card_data in cards.items() %}
        <div class="bingo-card">
            <div class="bingo-title">{{ card_data[0] }}</div>
            {% for number in card_data[1] %}
                <div class="bingo-cell">{{ number }}</div>
            {% endfor %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
