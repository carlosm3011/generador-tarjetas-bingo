    <title>Bingo Cards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .bingo-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 60%;
            margin: 0 auto;
        }

        .bingo-card {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: auto repeat(5, 1fr);
            border: 2px solid black;
            gap: 5px;
            padding: 10px;
        }

        .bingo-title {
            grid-column: 1 / span 5;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .bingo-cell {
            width: 50px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            border: 1px solid grey;
        }
    </style>
</head>
